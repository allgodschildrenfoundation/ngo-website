<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - All Gods Children Foundation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAVIGATION -->
<nav class="bg-blue-700 text-white px-6 py-4 shadow-md">
  <div class="max-w-6xl mx-auto flex justify-between items-center">

    <!-- LOGO -->
    <div class="flex items-center gap-2">
      <img src="images/logo.png" class="h-10" alt="Logo">
      <span class="text-xl font-bold">All Gods Children</span>
    </div>

    <!-- MOBILE BUTTON -->
    <button id="menuBtn" class="md:hidden text-3xl">☰</button>

    <!-- LINKS -->
    <div id="menu" class="hidden md:flex gap-6 font-semibold absolute md:static top-16 left-0 w-full md:w-auto bg-blue-700 md:bg-transparent p-6 md:p-0 flex-col md:flex-row">

      <a href="index.html" class="hover:text-yellow-300">Home</a>
      <a href="about.html" class="hover:text-yellow-300">About</a>
      <a href="programs.html" class="hover:text-yellow-300">Programs</a>
      <a href="gallery.html" class="text-yellow-300">Gallery</a>
      <a href="contact.html" class="hover:text-yellow-300">Contact</a>

    </div>

  </div>
</nav>

<!-- SCRIPT -->
<script>
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("menu");

  btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");
  });
</script>

</header>

    <img src="images/image1.jpg" class="w-full h-56 object-cover" alt="Gallery image">
