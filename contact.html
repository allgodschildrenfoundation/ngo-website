<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - All Gods Children Foundation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- NAVIGATION -->
<nav class="bg-blue-700 text-white px-6 py-4 shadow-md">
  <div class="max-w-6xl mx-auto flex justify-between items-center">

    <!-- LOGO -->
    <div class="flex items-center gap-2">
      <img src="images/logo.png" class="h-10" alt="Logo">
      <span class="text-xl font-bold">All Gods Children</span>
    </div>

    <!-- MOBILE BUTTON -->
    <button id="menuBtn" class="md:hidden text-3xl">☰</button>

    <!-- LINKS -->
    <div id="menu" class="hidden md:flex gap-6 font-semibold absolute md:static top-16 left-0 w-full md:w-auto bg-blue-700 md:bg-transparent p-6 md:p-0 flex-col md:flex-row">

      <a href="index.html" class="hover:text-yellow-300">Home</a>
      <a href="about.html" class="hover:text-yellow-300">About</a>
      <a href="programs.html" class="hover:text-yellow-300">Programs</a>
      <a href="gallery.html" class="hover:text-yellow-300">Gallery</a>
      <a href="contact.html" class="text-yellow-300">Contact</a>

    </div>

  </div>
</nav>

<!-- SCRIPT -->
<script>
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("menu");

  btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");
  });
</script>

<!-- HEADER -->
<header class="bg-white text-center py-10 shadow">
  <h1 class="text-4xl font-bold text-blue-700">Contact Us</h1>
  <p class="mt-2 text-gray-600">We would love to hear from you</p>
</header>

<!-- CONTACT SECTION -->
<section class="max-w-5xl mx-auto grid md:grid-cols-2 gap-6 mt-6 px-4">

  <!-- CONTACT INFO -->
  <div class="bg-white p-6 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-4">Get in Touch</h2>

    <p class="mb-3">📞 +256 701 973542</p>
    <p class="mb-3">📧 allgodschildrenfoundation@gmail.com</p>

    <!-- WHATSAPP BUTTON -->
    <a href="https://wa.me/256701973542"
       class="inline-block mt-4 bg-green-500 text-white px-6 py-3 rounded-xl font-bold">
      Chat on WhatsApp
    </a>

  </div>

  <!-- CONTACT FORM -->
  <div class="bg-white p-6 rounded-xl shadow">

    <h2 class="text-2xl font-bold mb-4">Send a Message</h2>

    <form>

      <input type="text" placeholder="Your Name"
        class="w-full mb-3 p-3 border rounded">

      <input type="email" placeholder="Your Email"
        class="w-full mb-3 p-3 border rounded">

      <textarea placeholder="Your Message"
        class="w-full mb-3 p-3 border rounded h-32"></textarea>

      <button type="button"
        class="bg-blue-700 text-white px-6 py-3 rounded-xl w-full font-bold">
        Send Message
      </button>

    </form>

    <p class="text-sm text-gray-500 mt-3">
      This form is currently for display only.
    </p>

  </div>

</section>

<!-- FOOTER -->
<footer class="text-center p-4 mt-6 text-gray-600">
  © 2026 All Gods Children Foundation
</footer>

</body>
</html>
